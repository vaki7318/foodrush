<div class="login-container">
  <div class="login-card">

    <h2>Connexion</h2>
    <p class="subtitle">Bienvenue sur FoodRush !</p>

    <div *ngIf="erreur" class="erreur">
      <mat-icon>error</mat-icon>
      {{ erreur }}
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="email" placeholder="exemple@email.com">
      <mat-icon matSuffix>email</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Mot de passe</mat-label>
      <input matInput [type]="cacheMotDePasse ? 'password' : 'text'" [(ngModel)]="motDePasse">
      <button type="button" mat-icon-button matSuffix (click)="cacheMotDePasse = !cacheMotDePasse">
        <mat-icon>{{ cacheMotDePasse ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <button type="button" class="btn-primary" (click)="login()">Se connecter</button>

    <p class="recuperation-lien">
      <a routerLink="/auth/recuperation">Mot de passe oublié ?</a>
    </p>

    <p class="inscription-lien">
      Pas encore de compte ?
      <a routerLink="/auth/inscription">S'inscrire</a>
    </p>

  </div>
</div>
