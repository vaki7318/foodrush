server:
  port: 8082

spring:
  application:
    name: business-service
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:foodrush_business}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.xml

jwt:
  secret: foodrush-secret-key-2026
  expiration: 86400000

cors:
  allowed-origins: http://localhost:4200,https://foodrush-projet.web.app,https://foodrush-projet.firebaseapp.com
