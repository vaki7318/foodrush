server:
  port: 8082

spring:
  application:
    name: business-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/foodrush_business}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.xml

jwt:
  secret: foodrush-secret-key-2026
  expiration: 86400000

cors:
  allowed-origins: http://localhost:4200
